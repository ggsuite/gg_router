name: gg_router_example
description: A GgRouter Demonstrator.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.12.2 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  gg_router:
    path: ../
  gg_value: ^1.6.3
  gg_map_animation: ^0.9.0
  intl: ^0.20.2

  flutter_web_plugins:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  gg_easy_widget_test: ^1.1.6
  flutter_localizations:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
